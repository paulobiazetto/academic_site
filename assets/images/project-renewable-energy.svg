<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img">
<rect width="640" height="360" fill="#FAFAF7"/>
<rect x="0.5" y="0.5" width="639" height="359" fill="none" stroke="#E6E5DF"/>

<!-- Sun (generation, solar) -->
<circle cx="150" cy="110" r="26" fill="none" stroke="#0B5563" stroke-width="2" opacity="0.85"/>
<g stroke="#0B5563" stroke-width="2" opacity="0.5">
  <line x1="150" y1="66" x2="150" y2="52"/>
  <line x1="150" y1="154" x2="150" y2="168"/>
  <line x1="106" y1="110" x2="92" y2="110"/>
  <line x1="194" y1="110" x2="208" y2="110"/>
  <line x1="118" y1="78" x2="108" y2="68"/>
  <line x1="182" y1="78" x2="192" y2="68"/>
  <line x1="118" y1="142" x2="108" y2="152"/>
  <line x1="182" y1="142" x2="192" y2="152"/>
</g>

<!-- Wind turbine (generation, wind) -->
<line x1="260" y1="270" x2="260" y2="140" stroke="#16181C" stroke-width="2.2" opacity="0.7"/>
<g stroke="#16181C" stroke-width="2.2" opacity="0.7" fill="none">
  <line x1="260" y1="140" x2="298" y2="128"/>
  <line x1="260" y1="140" x2="232" y2="108"/>
  <line x1="260" y1="140" x2="240" y2="172"/>
</g>
<circle cx="260" cy="140" r="3.5" fill="#16181C" opacity="0.7"/>

<!-- Flow line from generation into storage (battery) -->
<path d="M198 110 C 320 60, 420 90, 470 150" fill="none" stroke="#3E8693" stroke-width="2" opacity="0.55"/>
<path d="M298 128 C 360 160, 420 170, 470 178" fill="none" stroke="#3E8693" stroke-width="2" opacity="0.4"/>

<!-- Battery (storage) -->
<rect x="470" y="140" width="80" height="120" rx="6" fill="none" stroke="#0B5563" stroke-width="2"/>
<rect x="498" y="128" width="24" height="14" rx="3" fill="none" stroke="#0B5563" stroke-width="2"/>
<line x1="470" y1="220" x2="550" y2="220" stroke="#0B5563" stroke-width="1.4" opacity="0.35"/>
<rect x="480" y="225" width="60" height="26" fill="#0B5563" opacity="0.18"/>

<!-- Distribution line out to a load / grid node (utilization) -->
<path d="M470 240 H 380 V 300 H 120" fill="none" stroke="#16181C" stroke-width="2" opacity="0.55"/>
<polygon points="120,300 131,294 131,306" fill="#16181C" opacity="0.55"/>
<circle cx="95" cy="300" r="13" fill="none" stroke="#16181C" stroke-width="2" opacity="0.6"/>
<path d="M88 300 h14 M95 293 v14" stroke="#16181C" stroke-width="1.6" opacity="0.6"/>

<!-- Small grid/network nodes hinting at distributed control of the system -->
<circle cx="380" cy="300" r="5" fill="#3E8693" opacity="0.8"/>
<circle cx="300" cy="300" r="5" fill="#3E8693" opacity="0.5"/>
</svg>
