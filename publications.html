<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Publications — Paulo Biazetto</title>
  <meta name="description" content="Publications by Paulo Biazetto: journal articles, conference papers, book chapters, and preprints on control of distributed-parameter systems. Searchable with BibTeX." />
  <meta name="keywords" content="Paulo Biazetto, publications, bibliography, boundary control, PDE, BibTeX, control theory" />
  <meta name="author" content="Paulo Biazetto" />
  <link rel="canonical" href="https://example.edu/~paulo.biazetto/publications.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Publications — Paulo Biazetto" />
  <meta property="og:description" content="Searchable list of publications with abstracts and BibTeX." />
  <meta property="og:url" content="https://example.edu/~paulo.biazetto/publications.html" />
  <meta property="og:image" content="assets/profile/profile.svg" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <script src="theme-init.js"></script>
</head>

<body data-page="publications">
  <span id="top"></span>
  <a class="skip-link" href="#publications-main">Skip to main content</a>

  <header class="site-header" id="site-header"></header>

  <main class="page">
    <div class="container" id="publications-main">
      <div class="page-header">
        <p class="eyebrow">Publications</p>
        <h1 class="page-title">Publications</h1>
        <p class="section__intro">
          Search by title, author, or venue and filter by type. Each entry expands
          to show its abstract and a copyable BibTeX record.
        </p>
      </div>

      <!-- Search + type filters -->
      <div class="pub-controls">
        <div class="pub-search">
          <label class="visually-hidden" for="pub-search-input">Search publications</label>
          <input class="pub-search__input" id="pub-search-input" type="search"
                 placeholder="Search by title, author, or venue…" autocomplete="off" />
        </div>
        <div class="pub-filters" id="pub-filters" role="group" aria-label="Filter by type"></div>
      </div>

      <p class="pub-counter" id="pub-counter" aria-live="polite"></p>

      <!-- List is rendered from data/publications.json by script.js -->
      <ol class="pub-list" id="publication-list"></ol>
      <p class="pub-empty" id="pub-empty" hidden>No publications match your search.</p>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  <script src="script.js" defer></script>
</body>
</html>
